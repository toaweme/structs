name: Proposal / feature request
description: Propose a new capability or a change to how the structs library works.
labels: ["proposal", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        This project is **issue-first**. Open this proposal and wait for a
        maintainer to add the `approved` label before you open a pull request.
        PRs without an approved issue are flagged and usually closed.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do that structs makes hard or impossible today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed capability
      description: What should structs do? Describe the behavior consumers would see, not the implementation.
    validations:
      required: true
  - type: textarea
    id: api-shape
    attributes:
      label: API shape
      description: If this adds or changes exported API, sketch how a caller would use it.
      render: go
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other ways to solve this, and why they are worse.
    validations:
      required: false
