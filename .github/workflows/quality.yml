name: Quality

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # compatibility matrix: build and test across the Go versions we support, so a
  # change that needs a newer toolchain than go.mod declares is caught here.
  compat:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go: ['1.22', '1.23', '1.24', '1.25', '1.26']
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: ${{ matrix.go }}

      - run: go build ./...
      - run: go test ./... -count=1

  # care is the single quality gate: it runs build, lint, deps, runtime, docs,
  # tests, secrets, and vulnerability checks on the latest Go, then publishes the
  # report to the dashboard.
  quality:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # publish the report to the care dashboard
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: stable

      - uses: toaweme/care@8c5839056d7aeea9ffb5fb513bed9f9b9797e0d8 # v0.9.3
        with:
          strict: true # fail CI on a failing check
          publish-url: https://code.toawe.me/ingest?kind=care

      # publish this repo's code view to code.toawe.me
      - uses: toaweme/codereport@10bd1b60f6525ae86af9ba719ceedfc06c160271 # v0.3.0
        with:
          publish-url: https://code.toawe.me/ingest?kind=code
